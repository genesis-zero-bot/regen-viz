<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Regen Critique - Minimal</title>
  <style>
    body { margin: 0; background: #111; color: #fff; font-family: sans-serif; }
    #c { display: block; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script>
var nodes = [
  {id:"regen-movement",label:"Regenerative Movement",group:"central",val:50},
  {id:"love-peace-avoidance",label:"Love & Peace Avoidance",group:"core",val:30},
  {id:"dirty-laundry",label:"Washing Dirty Laundry",group:"core",val:28},
  {id:"corporate-coopt",label:"Corporate Co-optation",group:"external",val:28},
  {id:"nike",label:"Nike",group:"external",val:12},
  {id:"community-failure",label:"Community Failure 90%",group:"history",val:30},
  {id:"the-problem",label:"THE PROBLEM",group:"meta",val:35},
  {id:"suppressed-truths",label:"SUPPRESSED TRUTHS",group:"action",val:25}
];
var links = [
  {s:"regen-movement",t:"love-peace-avoidance"},
  {s:"regen-movement",t:"dirty-laundry"},
  {s:"regen-movement",t:"corporate-coopt"},
  {s:"regen-movement",t:"community-failure"},
  {s:"regen-movement",t:"the-problem"},
  {s:"dirty-laundry",t:"corporate-coopt"},
  {s:"corporate-coopt",t:"nike"},
  {s:"the-problem",t:"suppressed-truths"}
];
var colors = {central:'#f39c12',core:'#e74c3c',external:'#e67e22',history:'#3498db',meta:'#e91e63',action:'#f1c40f'};
var c = document.getElementById('c');
var ctx = c.getContext('2d');
c.width = window.innerWidth;
c.height = window.innerHeight;
var w = c.width, h = c.height;
nodes.forEach(function(n,i){ n.x = w/2 + (Math.random()-0.5)*100; n.y = h/2 + (Math.random()-0.5)*100; n.vx = 0; n.vy = 0; });
var nodeMap = {}; nodes.forEach(function(n){ nodeMap[n.id] = n; });
function sim() {
  nodes.forEach(function(n){ n.vx *= 0.9; n.vy *= 0.9; });
  links.forEach(function(l){ var s = nodeMap[l.s], t = nodeMap[l.t]; if(s && t){ var dx = t.x - s.x, dy = t.y - s.y, d = Math.sqrt(dx*dx+dy*dy)||1, f = (d-60)/d*0.1; s.vx += dx*f; s.vy += dy*f; t.vx -= dx*f; t.vy -= dy*f; } });
  nodes.forEach(function(n){ n.vx += (w/2-n.x)*0.001; n.vy += (h/2-n.y)*0.001; });
  nodes.forEach(function(a,i){ nodes.slice(i+1).forEach(function(b){ var dx=b.x-a.x, dy=b.y-a.y, d=Math.sqrt(dx*dx+dy*dy)||1, r=a.val/2+b.val/2+10; if(d<r){ var f=(r-d)/d*0.5; a.vx-=dx*f; a.vy-=dy*f; b.vx+=dx*f; b.vy+=dy*f; } }); });
  nodes.forEach(function(n){ n.x += n.vx; n.y += n.vy; n.x = Math.max(20,w-20); n.y = Math.max(20,h-20); });
}
function draw() {
  ctx.fillStyle = '#111'; ctx.fillRect(0,0,w,h);
  ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1;
  links.forEach(function(l){ var s = nodeMap[l.s], t = nodeMap[l.t]; if(s && t){ ctx.beginPath(); ctx.moveTo(s.x,s.y); ctx.lineTo(t.x,t.y); ctx.stroke(); } });
  nodes.forEach(function(n){ ctx.beginPath(); ctx.arc(n.x,n.y,n.val/2.5,0,7); ctx.fillStyle = colors[n.group]||'#666'; ctx.fill(); });
  ctx.fillStyle = '#fff'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
  nodes.forEach(function(n){ ctx.fillText(n.label.substring(0,12),n.x,n.y+n.val/2.5+12); });
}
function loop(){ sim(); draw(); requestAnimationFrame(loop); }
loop();
window.onresize = function(){ w = c.width = window.innerWidth; h = c.height = window.innerHeight; };
  </script>
</body>
</html>
